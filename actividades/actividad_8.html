<!-- Crea una página donde el usuario ingrese un número n y 
 se muestre una pirámide de asteriscos con n filas.--->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 8 - Triángulo de asteriscos</title>
</head>
<body>
    <h2>Ejercicio 8 - Pirámide de asteriscos</h2>
    <label for="filas">Número de filas:</label>
    <input type="number" id="filas" placeholder="Ej: 5">
    <button id="botonTriangulo">Dibujar pirámide</button>
    <br><br>
    <label id="lblTriangulo"></label>

    <script>
        document.getElementById("botonTriangulo").addEventListener("click", function () {
            let n = parseInt(document.getElementById("filas").value);

            if (isNaN(n) || n <= 0) {
                document.getElementById("lblTriangulo").innerHTML = "Introduce un número válido mayor que 0.";
                return;
            }

            let resultado = "";
            for (let i = 1; i <= n; i++) {
                for (let j = 1; j <= i; j++) {
                    resultado += "* ";
                }
                resultado += "<br>";
            }

            document.getElementById("lblTriangulo").innerHTML = resultado;
        });
    </script>
</body>
</html>
